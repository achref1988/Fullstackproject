version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always       
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: mydb
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"        
    volumes:
      - mysql-data:/var/lib/mysql    
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    

  backend:
    build:
      context: ./backend     
      dockerfile: Dockerfile
    container_name: backend
    restart: always

    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mydb
      SPRING_DATASOURCE_USERNAME: mydb
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
       
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend  
      dockerfile: Dockerfile
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend             
    networks:
      - app-network

volumes:
  mysql-data:               
    driver: local

networks:
  app-network:              
    driver: bridge
